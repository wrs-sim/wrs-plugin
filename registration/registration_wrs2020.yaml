format_version: 20.0
robot_list: &RobotList [ AizuSpiderDA, DoubleArmV7A ]

registrations:
  - &TS
    name: ts1
    task_project: [ TS1, Common ]
    robot_project: *RobotList
    robot_alignment: X+
    start_position: [ 1.0, -0.5, 0.0 ]
    simulator_project: [ AGXSimulator2, AISTSimulator2 ]
    view_project: RefereeView
    enable_recording: false
    # enable_tracking: true
    # enable_ros: false
    enable_ros: true
  - <<: *TS
    name: ts2
    task_project: [ TS2, Common ]
    robot_alignment: X+
    start_position: [ 1.0, 1.0, 0.0 ]
  - <<: *TS
    name: ts3
    task_project: [ TS3, Common ]
    robot_alignment: X+
    start_position: [ 1.0, 1.0, 0.0 ]
  - <<: *TS
    name: ts4
    task_project: [ TS4, Common ]
    robot_alignment: X+
    start_position: [ 1.0, 1.0, 0.0 ]